<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yenkgg — projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dim:  #0D0D14;
    --dim2: #12121C;
    --dim3: #1A1A2E;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --text: #E8E8F0;
    --muted: #8888AA;

    /* Volt — purple */
    --volt:  #7B61FF;
    --volt2: #A78BFA;
    --volt3: #C4B5FD;
    --volt-glow: rgba(123,97,255,0.55);

    /* Potassium — rose */
    --pot:   #FF6190;
    --pot2:  #FF92AD;
    --pot3:  #FFC0CE;
    --pot-glow: rgba(255,97,144,0.55);

    /* Unnamed — rainbow anchor for grid */
    --rb1: #FF6190;
    --rb2: #FFA94D;
    --rb3: #FFE94D;
    --rb4: #4DFFA0;
    --rb5: #4DB8FF;
    --rb6: #A04DFF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dim);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    cursor: none;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Custom cursor */
  #cursor {
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: screen;
  }
  #cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid rgba(123,97,255,0.5);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
  }

  /* Canvas */
  canvas#bg {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.7;
  }

  /* Floating hexagons */
  .hex-field {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    perspective: 1200px;
    transform-style: preserve-3d;
  }
  .hex {
    position: absolute;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    animation: floatHex var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    filter: blur(0.5px);
  }
  @keyframes floatHex {
    0%,100% { transform: rotateX(var(--rx)) rotateY(var(--ry)) translateY(0); opacity: var(--op); }
    50%      { transform: rotateX(calc(var(--rx)+8deg)) rotateY(calc(var(--ry)+5deg)) translateY(-20px); opacity: calc(var(--op)*0.5); }
  }

  /* Main wrapper */
  main {
    position: relative; z-index: 10;
    width: 100%; max-width: 680px;
    padding: 5rem 2rem 4rem;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 3.5rem;
  }

  /* Hero */
  .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

  .hero-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.4rem 1rem; border-radius: 100px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
    animation: fadeUp 0.8s ease both;
  }
  .hero-tag::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    display: block; animation: pulse 2s infinite;
    background: conic-gradient(from 0deg, var(--rb1), var(--rb3), var(--rb4), var(--rb5), var(--rb6), var(--rb1));
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  .hero-title {
    font-size: clamp(3.8rem, 10vw, 7.5rem);
    font-weight: 800; line-height: 0.92;
    letter-spacing: -0.04em; color: #fff;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .hero-title .grad {
    background: linear-gradient(120deg, var(--pot2) 0%, var(--volt2) 50%, var(--rb4) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(167,139,250,0.4));
  }

  .hero-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem; color: var(--muted);
    line-height: 1.8; max-width: 42ch;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Cards */
  .cards {
    width: 100%;
    display: flex; flex-direction: column;
    gap: 1.1rem;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .card {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 1.5rem 1.8rem;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    text-decoration: none; color: var(--text);
    position: relative; overflow: hidden;
    cursor: none;
    transition: border-color 0.25s, transform 0.25s;
    backdrop-filter: blur(4px);
  }

  /* glow bleed on the left edge */
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 16px 0 0 16px;
    opacity: 0; transition: opacity 0.3s;
  }
  /* inner bg shimmer */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }

  .card:hover { transform: translateX(6px); }
  .card:hover::before { opacity: 1; }
  .card:hover::after  { opacity: 1; }

  /* Volt — purple */
  .card-volt::before { background: var(--volt2); box-shadow: 0 0 16px var(--volt-glow); }
  .card-volt::after  { background: radial-gradient(ellipse at 0% 50%, rgba(123,97,255,0.1) 0%, transparent 65%); }
  .card-volt:hover   { border-color: rgba(123,97,255,0.45); box-shadow: 0 0 32px rgba(123,97,255,0.15); }

  /* Potassium — rose */
  .card-pot::before  { background: var(--pot2); box-shadow: 0 0 16px var(--pot-glow); }
  .card-pot::after   { background: radial-gradient(ellipse at 0% 50%, rgba(255,97,144,0.1) 0%, transparent 65%); }
  .card-pot:hover    { border-color: rgba(255,97,144,0.45); box-shadow: 0 0 32px rgba(255,97,144,0.15); }

  /* Unnamed — rainbow */
  .card-rb::before {
    background: linear-gradient(to bottom, var(--rb1), var(--rb2), var(--rb3), var(--rb4), var(--rb5), var(--rb6));
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
  }
  .card-rb::after { background: radial-gradient(ellipse at 0% 50%, rgba(255,200,255,0.07) 0%, transparent 65%); }
  .card-rb:hover  { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 32px rgba(200,150,255,0.12); }

  .card-left  { display: flex; flex-direction: column; gap: 0.35rem; }
  .card-num   { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em; color: var(--muted); }
  .card-name  { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }

  .card-volt .card-name { color: var(--volt3); text-shadow: 0 0 24px var(--volt-glow); }
  .card-pot  .card-name { color: var(--pot3);  text-shadow: 0 0 24px var(--pot-glow); }
  .card-rb   .card-name {
    background: linear-gradient(90deg, var(--rb1), var(--rb3), var(--rb4), var(--rb5), var(--rb6));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.2));
  }

  .card-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--muted); font-style: italic;
  }

  .card-arrow {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
  }
  .card:hover .card-arrow { transform: translate(2px, -2px); }
  .card-volt:hover .card-arrow { background: rgba(123,97,255,0.15); border-color: rgba(123,97,255,0.5); box-shadow: 0 0 12px var(--volt-glow); }
  .card-pot:hover  .card-arrow { background: rgba(255,97,144,0.15); border-color: rgba(255,97,144,0.5); box-shadow: 0 0 12px var(--pot-glow); }
  .card-rb:hover   .card-arrow { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); box-shadow: 0 0 12px rgba(200,150,255,0.3); }

  .card-arrow svg { width: 16px; height: 16px; stroke: var(--muted); stroke-width: 2; fill: none; transition: stroke 0.25s; }
  .card-volt:hover .card-arrow svg { stroke: var(--volt3); }
  .card-pot:hover  .card-arrow svg { stroke: var(--pot3); }
  .card-rb:hover   .card-arrow svg { stroke: #fff; }

  /* Footer */
  footer {
    position: relative; z-index: 10;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 0.08em;
    animation: fadeUp 0.8s 0.45s ease both;
    padding-bottom: 2rem;
  }
  footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.12); transition: color 0.2s; }
  footer a:hover { color: #fff; }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bg"></canvas>
<div class="hex-field" id="hexField"></div>

<main>
  <section class="hero">
    <div class="hero-tag">yenkgg &nbsp;·&nbsp; personal projects</div>
    <h1 class="hero-title">hey, i'm<br><span class="grad">yenkgg</span></h1>
    <p class="hero-sub">small tiktok creator.<br>these are the things i build.</p>
  </section>

  <div class="cards">

    <a class="card card-volt" href="https://yenkgg.github.io/volt" target="_blank" rel="noopener">
      <div class="card-left">
        <span class="card-num">01 ——</span>
        <span class="card-name">Volt</span>
        <span class="card-url">.gg/voltbz</span>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7v10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

    <a class="card card-pot" href="https://yenkgg.github.io/potassium" target="_blank" rel="noopener">
      <div class="card-left">
        <span class="card-num">02 ——</span>
        <span class="card-name">Potassium</span>
        <span class="card-url">.gg/potassium</span>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7v10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

    <a class="card card-rb" href="https://yenkgg.github.io/enhancements" target="_blank" rel="noopener">
      <div class="card-left">
        <span class="card-num">03 ——</span>
        <span class="card-name">Unnamed Enhancements</span>
        <span class="card-url">.gg/enhancements</span>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7v10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

  </div>

  <footer>made by <a href="https://github.com/yenkgg" target="_blank" rel="noopener">yenkgg</a></footer>
</main>

<script>
/* ── Custom cursor ── */
const cur  = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
});
(function animRing(){
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
})();
document.querySelectorAll('a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ cur.style.width='20px'; cur.style.height='20px'; });
  el.addEventListener('mouseleave',()=>{ cur.style.width='12px'; cur.style.height='12px'; });
});

/* ── Interactive mouse-reactive grid canvas ── */
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  pts=[];
  const cols=Math.ceil(W/80)+1, rows=Math.ceil(H/80)+1;
  for(let i=0;i<cols;i++) for(let j=0;j<rows;j++){
    pts.push({x:i*80,y:j*80,ox:i*80,oy:j*80,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3});
  }
}
resize();
window.addEventListener('resize',resize);
let mouseX=0,mouseY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});

/* rainbow colour cycle for grid lines near cursor */
function rainbowAt(t){
  const hue=(t*360)%360;
  return `hsl(${hue},100%,65%)`;
}

function drawFrame(t){
  ctx.clearRect(0,0,W,H);
  const cols=Math.ceil(W/80)+1;
  pts.forEach(p=>{
    const dx=mouseX-p.x, dy=mouseY-p.y, dist=Math.hypot(dx,dy);
    if(dist<220){ p.vx-=dx/dist*.18; p.vy-=dy/dist*.18; }
    p.vx+=(p.ox-p.x)*.02; p.vy+=(p.oy-p.y)*.02;
    p.vx*=.92; p.vy*=.92;
    p.x+=p.vx; p.y+=p.vy;
  });
  ctx.lineWidth=0.5;
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const dMouse=Math.hypot(mouseX-p.x,mouseY-p.y);
    const factor=Math.max(0,1-dMouse/280);
    if((i+1)%cols!==0 && i+1<pts.length){
      const q=pts[i+1];
      if(factor>0.05){
        ctx.strokeStyle=`hsla(${(t*.02+(i*7))%360},90%,65%,${factor*0.5})`;
      } else {
        ctx.strokeStyle=`rgba(123,97,255,${0.03+(factor)*0.1})`;
      }
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
    }
    if(i+cols<pts.length){
      const q=pts[i+cols];
      if(factor>0.05){
        ctx.strokeStyle=`hsla(${(t*.02+(i*7)+60)%360},90%,65%,${factor*0.5})`;
      } else {
        ctx.strokeStyle=`rgba(123,97,255,${0.03+(factor)*0.1})`;
      }
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
    }
    if(dMouse<280){
      const hue=(t*.05+(i*11))%360;
      ctx.fillStyle=`hsla(${hue},100%,70%,${factor*.6})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,1.8,0,Math.PI*2); ctx.fill();
    }
  }
  requestAnimationFrame(drawFrame);
}
requestAnimationFrame(t=>drawFrame(t));

/* ── Floating hexagons ── */
const hexField=document.getElementById('hexField');
const hexColors=[
  ['rgba(123,97,255,0.12)','rgba(123,97,255,0.2)'],   // purple
  ['rgba(255,97,144,0.12)','rgba(255,97,144,0.2)'],   // rose
  ['rgba(77,255,160,0.08)','rgba(77,255,160,0.15)'],  // green
  ['rgba(77,184,255,0.08)','rgba(77,184,255,0.15)'],  // blue
  ['rgba(255,233,77,0.07)','rgba(255,200,77,0.12)'],  // yellow
];
for(let i=0;i<20;i++){
  const h=document.createElement('div');
  h.className='hex';
  const size=35+Math.random()*80;
  const [bg,border]=hexColors[i%hexColors.length];
  h.style.cssText=`
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${size}px;
    height:${size*1.15}px;
    background:${bg};
    border:1px solid ${border};
    --rx:${-20+Math.random()*40}deg;
    --ry:${-30+Math.random()*60}deg;
    --dur:${5+Math.random()*9}s;
    --delay:${-Math.random()*9}s;
    --op:${0.08+Math.random()*0.25};
    opacity:${0.08+Math.random()*0.25};
  `;
  hexField.appendChild(h);
}
</script>
</body>
</html>
