<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZKVault // Terminal</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --fg: #00ff00;
            --fg-dim: #008800;
            --bg-hl: #1a1a1a;
            --border: #333;
            --alert: #ff003c;
            font-family: 'Courier New', Courier, monospace;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); overflow: hidden; }
        * { box-sizing: border-box; outline: none; }
        
        /* Views */
        #login-view, #app-view { display: none; height: 100%; width: 100%; }
        #login-view.active, #app-view.active { display: flex; }
        
        /* Login */
        #login-view { flex-direction: column; align-items: center; justify-content: center; }
        .prompt { margin-bottom: 20px; font-size: 1.2rem; }
        input[type="password"], input[type="text"] { 
            background: transparent; color: var(--fg); border: 1px solid var(--fg-dim); 
            padding: 10px; font-family: inherit; font-size: 1rem; width: 300px; 
        }
        input[type="password"]:focus { border-color: var(--fg); }
        
        /* App Layout (Tmux style) */
        #app-view { flex-direction: row; }
        #sidebar { width: 250px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; }
        
        /* Sidebar Lists */
        .buffer-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .buffer-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .buffer-item:hover, .buffer-item.active { background: var(--bg-hl); }
        .buffer-item.ephemeral { color: var(--alert); }
        
        /* Editor */
        #editor-header { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: bold; }
        #editor { flex: 1; background: transparent; color: var(--fg); border: none; padding: 20px; resize: none; font-family: inherit; font-size: 1rem; }
        
        /* Status Bar */
        #status-bar { border-top: 1px solid var(--border); padding: 5px 10px; font-size: 0.8rem; display: flex; justify-content: space-between; color: var(--fg-dim); }
        
        .hidden { display: none !important; }
        button { background: var(--bg); color: var(--fg); border: 1px solid var(--fg-dim); cursor: pointer; font-family: inherit; padding: 5px 10px; }
        button:hover { background: var(--fg-dim); color: var(--bg); }
    </style>
</head>
<body>

    <div id="login-view" class="active">
        <div class="prompt">> INITIALIZE SECURE VAULT</div>
        <div>
            <span style="color: var(--fg-dim)">Password: </span>
            <input type="password" id="master-password" autofocus placeholder="Enter key to decrypt...">
        </div>
        <div id="login-error" style="color: var(--alert); margin-top: 10px; font-size: 0.9rem;"></div>
        <div style="margin-top: 20px; font-size: 0.8rem; color: var(--fg-dim);">[Press Enter to Unlock/Create]</div>
    </div>

    <div id="app-view">
        <div id="sidebar">
            <div style="padding: 10px; border-bottom: 1px solid var(--border); font-weight: bold;">BUFFERS</div>
            <ul class="buffer-list" id="buffer-list"></ul>
            <div style="padding: 10px; border-top: 1px solid var(--border);">
                <input type="text" id="new-buffer-name" placeholder="new_buffer.md" style="width: 100%; padding: 5px;">
                <div style="margin-top: 5px; font-size: 0.8rem; display: flex; gap: 5px;">
                    <label><input type="checkbox" id="is-ephemeral"> Volatile (1hr TTL)</label>
                </div>
            </div>
        </div>
        <div id="main">
            <div id="editor-header">
                <span id="current-buffer-name">[ No Buffer Selected ]</span>
                <span>
                    <button onclick="exportVault()">[Export Encrypted Flat-File]</button>
                    <input type="file" id="import-file" style="display:none;" onchange="importVault(event)">
                    <button onclick="document.getElementById('import-file').click()">[Import]</button>
                </span>
            </div>
            <textarea id="editor" spellcheck="false" disabled></textarea>
            <div id="status-bar">
                <span id="status-msg">NORMAL -- Press Ctrl+S to save, Ctrl+F to focus buffers</span>
                <span id="crypto-status">AES-GCM 256</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * Core State & Cryptography Setup
         */
        let vault = {}; // Decrypted state: { "name": { content: "...", ttl: null | timestamp } }
        let currentKey = null;
        let activeBuffer = null;

        // Crypto Configurations
        const SALT = new TextEncoder().encode("ZKVaultStaticSalt_ChangeInProd"); // In a real app, generate securely and store with ciphertext
        const ITERATIONS = 100000;

        async function deriveKey(password) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), {name: "PBKDF2"}, false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: SALT, iterations: ITERATIONS, hash: "SHA-256" },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptData(data, key) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const ciphertext = await crypto.subtle.encrypt({name: "AES-GCM", iv: iv}, key, enc.encode(JSON.stringify(data)));
            
            // Combine IV and Ciphertext for storage
            const payload = new Uint8Array(iv.length + ciphertext.byteLength);
            payload.set(iv, 0);
            payload.set(new Uint8Array(ciphertext), iv.length);
            return btoa(String.fromCharCode.apply(null, payload));
        }

        async function decryptData(base64Payload, key) {
            try {
                const binaryStr = atob(base64Payload);
                const payload = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) payload[i] = binaryStr.charCodeAt(i);
                
                const iv = payload.slice(0, 12);
                const ciphertext = payload.slice(12);
                const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, key, ciphertext);
                
                return JSON.parse(new TextDecoder().decode(decrypted));
            } catch (e) {
                return null; // Decryption failed (wrong password)
            }
        }

        /**
         * UI Logic & Workflows
         */
        const els = {
            loginView: document.getElementById('login-view'),
            appView: document.getElementById('app-view'),
            passwordInput: document.getElementById('master-password'),
            errorMsg: document.getElementById('login-error'),
            bufferList: document.getElementById('buffer-list'),
            editor: document.getElementById('editor'),
            headerName: document.getElementById('current-buffer-name'),
            statusMsg: document.getElementById('status-msg'),
            newBufferName: document.getElementById('new-buffer-name'),
            isEphemeral: document.getElementById('is-ephemeral')
        };

        // Login / Initialization
        els.passwordInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const pwd = els.passwordInput.value;
                if (!pwd) return;
                
                currentKey = await deriveKey(pwd);
                const storedData = localStorage.getItem('zkvault_data');
                
                if (storedData) {
                    const decrypted = await decryptData(storedData, currentKey);
                    if (decrypted) {
                        vault = decrypted;
                        cleanEphemeral();
                        bootApp();
                    } else {
                        els.errorMsg.innerText = "[ERROR] Decryption failed. Invalid key.";
                    }
                } else {
                    // First time setup
                    vault = { "welcome.md": { content: "# Vault Initialized\n\nWelcome to your decentralized zero-knowledge pastebin.", ttl: null }};
                    await saveVault();
                    bootApp();
                }
            }
        });

        function bootApp() {
            els.loginView.classList.remove('active');
            els.appView.classList.add('active');
            els.passwordInput.value = '';
            renderSidebar();
            if (Object.keys(vault).length > 0) loadBuffer(Object.keys(vault)[0]);
            els.editor.focus();
        }

        // Ephemeral Buffer Garbage Collection
        function cleanEphemeral() {
            const now = Date.now();
            let changed = false;
            for (let name in vault) {
                if (vault[name].ttl && now > vault[name].ttl) {
                    delete vault[name];
                    changed = true;
                }
            }
            if (changed) saveVault();
        }

        // Buffer Management
        function renderSidebar() {
            els.bufferList.innerHTML = '';
            for (let name in vault) {
                const li = document.createElement('li');
                li.className = `buffer-item ${vault[name].ttl ? 'ephemeral' : ''} ${name === activeBuffer ? 'active' : ''}`;
                li.innerHTML = `<span>${name}</span> ${vault[name].ttl ? '[V]' : ''}`;
                li.onclick = () => loadBuffer(name);
                els.bufferList.appendChild(li);
            }
        }

        function loadBuffer(name) {
            if (!vault[name]) return;
            activeBuffer = name;
            els.headerName.innerText = name;
            els.editor.value = vault[name].content;
            els.editor.disabled = false;
            renderSidebar();
            
            // Wipe ephemeral immediately if it's view-once (optional logic, currently TTL based)
        }

        // Keyboard Shortcuts (Multiplexer feel)
        document.addEventListener('keydown', async (e) => {
            if (!els.appView.classList.contains('active')) return;

            // Ctrl+S to save current buffer
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                if (activeBuffer) {
                    vault[activeBuffer].content = els.editor.value;
                    await saveVault();
                    setStatus("Buffer written & encrypted.");
                }
            }
            
            // Ctrl+F to focus new buffer input
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                els.newBufferName.focus();
            }
        });

        // Create new buffer
        els.newBufferName.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && els.newBufferName.value.trim() !== '') {
                const name = els.newBufferName.value.trim();
                const ephemeral = els.isEphemeral.checked;
                
                vault[name] = {
                    content: "",
                    ttl: ephemeral ? Date.now() + (60 * 60 * 1000) : null // 1 hour TTL
                };
                
                els.newBufferName.value = '';
                els.isEphemeral.checked = false;
                await saveVault();
                renderSidebar();
                loadBuffer(name);
                els.editor.focus();
            }
        });

        async function saveVault() {
            const encrypted = await encryptData(vault, currentKey);
            localStorage.setItem('zkvault_data', encrypted);
        }

        function setStatus(msg) {
            els.statusMsg.innerText = msg;
            setTimeout(() => els.statusMsg.innerText = "NORMAL -- Press Ctrl+S to save, Ctrl+F to focus buffers", 3000);
        }

        // --- Flat File Export/Import ---
        function exportVault() {
            const data = localStorage.getItem('zkvault_data');
            if(!data) return;
            const blob = new Blob([data], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'zkvault_encrypted.txt';
            a.click();
        }

        function importVault(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const contents = e.target.result;
                const decrypted = await decryptData(contents, currentKey);
                if (decrypted) {
                    localStorage.setItem('zkvault_data', contents);
                    vault = decrypted;
                    cleanEphemeral();
                    renderSidebar();
                    setStatus("Vault synced from file.");
                } else {
                    alert("Import failed. Either corrupted file or incorrect master password.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
